<section class="login-shell">
  <div class="login-shell__header">
    <p class="login-shell__eyebrow">Acesso seguro</p>
    <h3>Entrar no painel</h3>
    <p class="login-shell__subtitle">Use seu e-mail e senha para acessar a operação do sistema.</p>
  </div>

  <form class="login-form" [formGroup]="form" (ngSubmit)="submit()">
    <label class="field" [class.field--invalid]="form.controls.email.invalid && form.controls.email.touched">
      <span class="field__label">E-mail</span>
      <input class="input" type="email" formControlName="email" placeholder="admin@imoveis.dev" />
      @if (form.controls.email.invalid && form.controls.email.touched) {
        <small class="field__hint field__hint--error">Informe um e-mail válido para continuar.</small>
      }
    </label>

    <label class="field" [class.field--invalid]="form.controls.password.invalid && form.controls.password.touched">
      <span class="field__label">Senha</span>
      <input class="input" type="password" formControlName="password" placeholder="123456" />
      @if (form.controls.password.invalid && form.controls.password.touched) {
        <small class="field__hint field__hint--error">A senha deve ter ao menos 6 caracteres.</small>
      }
    </label>

    <button class="btn btn-primary login-form__submit" type="submit" [disabled]="isSubmitting()">
      @if (isSubmitting()) {
        Entrando...
      } @else {
        Entrar no sistema
      }
    </button>
  </form>

  <small class="hint">Credenciais padrão: admin@imoveis.dev / 123456</small>
</section>
