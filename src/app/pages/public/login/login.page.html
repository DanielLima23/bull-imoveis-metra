<form class="login-form" [formGroup]="form" (ngSubmit)="submit()">
  <label class="field">
    <span class="field__label">E-mail</span>
    <input class="input" type="email" formControlName="email" placeholder="admin@imoveis.dev" />
  </label>

  <label class="field">
    <span class="field__label">Senha</span>
    <input class="input" type="password" formControlName="password" placeholder="123456" />
  </label>

  <button class="btn btn-primary" type="submit" [disabled]="isSubmitting()">
    @if (isSubmitting()) {
      Entrando...
    } @else {
      Entrar
    }
  </button>

  <small class="hint">Credenciais padrão: admin@imoveis.dev / 123456</small>
</form>
