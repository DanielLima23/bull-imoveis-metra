<app-page-header
  [title]="isEdit() ? 'Editar Locação' : 'Nova Locação'"
  subtitle="Contrato completo alinhado aos campos do Swagger"
  [breadcrumbs]="[{ label: 'Painel', route: '/app/dashboard' }, { label: 'Locações', route: '/app/locacoes' }, { label: isEdit() ? 'Editar' : 'Novo' }]"
/>

<section class="card-panel">
  <form class="grid-form lease-form" [formGroup]="form" (ngSubmit)="submit()">
    <div class="field field--full section-title"><h2>Vínculo</h2></div>

    <div class="field">
      <label class="field__label">Imóvel</label>
      <app-async-search-select
        formControlName="propertyId"
        [fetchPage]="propertySelectFetchPage"
        [fetchById]="propertySelectFetchById"
        [allowClear]="false"
        [useFloatingPanel]="true"
      />
    </div>

    <div class="field">
      <label class="field__label">Locatário</label>
      <app-async-search-select
        formControlName="tenantId"
        [fetchPage]="tenantSelectFetchPage"
        [fetchById]="tenantSelectFetchById"
        [allowClear]="false"
        [useFloatingPanel]="true"
      />
    </div>

    <div class="field field--action">
      <label class="field__label">Atalho</label>
      <button class="btn btn-secondary" type="button" (click)="goToCreateTenant()">Cadastrar locatário</button>
    </div>

    <div class="field field--full section-title"><h2>Condições principais</h2></div>

    <div class="field">
      <label class="field__label">Início</label>
      <input class="input" formControlName="startDate" appDateBrInput placeholder="dd/mm/aaaa" />
    </div>

    <div class="field">
      <label class="field__label">Fim</label>
      <input class="input" formControlName="endDate" appDateBrInput placeholder="dd/mm/aaaa" />
    </div>

    <div class="field">
      <label class="field__label">Aluguel mensal</label>
      <input class="input" formControlName="monthlyRent" appBrlCurrencyInput placeholder="R$ 0,00" />
    </div>

    <div class="field">
      <label class="field__label">Caução</label>
      <input class="input" formControlName="depositAmount" appBrlCurrencyInput placeholder="R$ 0,00" />
    </div>

    <div class="field">
      <label class="field__label">Contrato com</label>
      <input class="input" formControlName="contractWith" placeholder="Informe com quem o contrato foi firmado" />
    </div>

    <div class="field">
      <label class="field__label">Dia do pagamento</label>
      <input class="input" type="number" min="1" max="31" formControlName="paymentDay" placeholder="Dia do vencimento" />
    </div>

    <div class="field">
      <label class="field__label">Local do pagamento</label>
      <input class="input" formControlName="paymentLocation" placeholder="Informe o local de pagamento" />
    </div>

    <div class="field">
      <label class="field__label">Índice de reajuste</label>
      <input class="input" formControlName="readjustmentIndex" placeholder="Ex.: IGPM, IPCA" />
    </div>

    @if (isEdit()) {
      <div class="field">
        <label class="field__label">Status</label>
        <app-async-search-select
          formControlName="status"
          [staticOptions]="leaseStatusOptions"
          [searchable]="false"
          [allowClear]="false"
        />
      </div>
    }

    <div class="field field--full section-title"><h2>Garantias e formalização</h2></div>

    <div class="field">
      <label class="field__label">Registro do contrato</label>
      <input class="input" formControlName="contractRegistration" placeholder="Informe o registro do contrato" />
    </div>

    <div class="field">
      <label class="field__label">Seguro</label>
      <input class="input" formControlName="insurance" placeholder="Informe o seguro, se houver" />
    </div>

    <div class="field">
      <label class="field__label">Reconhecimento de firma</label>
      <input class="input" formControlName="signatureRecognition" placeholder="Informe o reconhecimento de firma" />
    </div>

    <div class="field">
      <label class="field__label">Pessoa do fiador</label>
      <app-party-picker-field
        formControlName="guarantorPartyId"
        [allowedKinds]="['FIADOR', 'PERSON', 'COMPANY', 'OUTRO']"
        defaultKind="FIADOR"
        placeholder="Selecione o fiador"
        (partyChange)="onGuarantorPartyChange($event)"
      />
    </div>

    <div class="field">
      <label class="field__label">Nome do fiador</label>
      <input class="input" [class.input--locked]="isGuarantorLocked()" formControlName="guarantorName" [readOnly]="isGuarantorLocked()" placeholder="Informe o nome do fiador" />
    </div>

    <div class="field">
      <label class="field__label">Documento do fiador</label>
      <input class="input" [class.input--locked]="isGuarantorLocked()" formControlName="guarantorDocument" [readOnly]="isGuarantorLocked()" appCpfCnpjInput placeholder="CPF ou CNPJ do fiador" />
    </div>

    <div class="field">
      <label class="field__label">Telefone do fiador</label>
      <input class="input" [class.input--locked]="isGuarantorLocked()" formControlName="guarantorPhone" [readOnly]="isGuarantorLocked()" appPhoneBrInput placeholder="(00) 00000-0000" />
    </div>

    <div class="field field--full section-title"><h2>Contato adicional</h2></div>

    <div class="field">
      <label class="field__label">Pessoa do contato adicional</label>
      <app-party-picker-field
        formControlName="optionalContactPartyId"
        [allowedKinds]="['PERSON', 'COMPANY', 'OUTRO', 'REPRESENTANTE_LEGAL']"
        defaultKind="PERSON"
        placeholder="Selecione o contato"
        (partyChange)="onOptionalContactPartyChange($event)"
      />
    </div>

    <div class="field">
      <label class="field__label">Nome do contato</label>
      <input class="input" [class.input--locked]="isOptionalContactLocked()" formControlName="optionalContactName" [readOnly]="isOptionalContactLocked()" placeholder="Informe o nome do contato" />
    </div>

    <div class="field">
      <label class="field__label">Telefone do contato</label>
      <input class="input" [class.input--locked]="isOptionalContactLocked()" formControlName="optionalContactPhone" [readOnly]="isOptionalContactLocked()" appPhoneBrInput placeholder="(00) 00000-0000" />
    </div>

    <div class="field field--full">
      <label class="field__label">Observações</label>
      <textarea class="textarea" rows="4" formControlName="notes" placeholder="Adicione observações do contrato"></textarea>
    </div>

    <div class="actions">
      <button class="btn btn-secondary" type="button" (click)="back()">Cancelar</button>
      <button class="btn btn-primary" type="submit" [disabled]="submitting()">
        @if (submitting()) { Salvando... } @else { Salvar contrato }
      </button>
    </div>
  </form>
</section>
