<app-page-header
  [title]="isEdit() ? 'Editar Locação' : 'Nova Locação'"
  subtitle="Tela única de criação e atualização de contrato"
  [breadcrumbs]="[{ label: 'Dashboard', route: '/app/dashboard' }, { label: 'Locações', route: '/app/locacoes' }, { label: isEdit() ? 'Editar' : 'Novo' }]"
/>

<section class="card-panel">
  @if (isEdit() && selectedLease(); as lease) {
    <div class="contract-info">
      <div>
        <span>Imóvel</span>
        <strong>{{ lease.propertyTitle }}</strong>
      </div>
      <div>
        <span>Locatário</span>
        <strong>{{ lease.tenantName }}</strong>
      </div>
    </div>
  }

  <form class="grid-form" [formGroup]="form" (ngSubmit)="submit()">
    <div class="field">
      <label class="field__label">Imóvel</label>
      <app-async-search-select
        formControlName="propertyId"
        placeholder="Selecione"
        searchPlaceholder="Buscar imóvel..."
        [pageSize]="15"
        [fetchPage]="propertySelectFetchPage"
        [fetchById]="propertySelectFetchById"
      />
    </div>

    <div class="field">
      <label class="field__label">Locatário</label>
      <div class="tenant-field">
        <app-async-search-select
          formControlName="tenantId"
          placeholder="Selecione"
          searchPlaceholder="Buscar locatário..."
          [pageSize]="15"
          [fetchPage]="tenantSelectFetchPage"
          [fetchById]="tenantSelectFetchById"
        />
        @if (!isEdit()) {
          <button class="btn btn-secondary tenant-field__button" type="button" (click)="goToCreateTenant()">Novo locatário</button>
        }
      </div>
    </div>

    <div class="field">
      <label class="field__label">Início</label>
      <input class="input" type="text" inputmode="numeric" formControlName="startDate" placeholder="dd/mm/yyyy" appDateBrInput />
    </div>

    <div class="field">
      <label class="field__label">Fim</label>
      <input class="input" type="text" inputmode="numeric" formControlName="endDate" placeholder="dd/mm/yyyy" appDateBrInput />
    </div>

    <div class="field">
      <label class="field__label">Aluguel mensal</label>
      <input class="input" type="text" inputmode="decimal" formControlName="monthlyRent" appBrlCurrencyInput />
    </div>

    <div class="field">
      <label class="field__label">Caucao</label>
      <input class="input" type="text" inputmode="decimal" formControlName="depositAmount" appBrlCurrencyInput />
    </div>

    @if (isEdit()) {
      <div class="field">
        <label class="field__label">Status</label>
        <app-async-search-select
          formControlName="status"
          [staticOptions]="leaseStatusOptions"
          [searchable]="false"
          [allowClear]="false"
        />
      </div>
    }

    <div class="field field--full">
      <label class="field__label">Observações</label>
      <textarea class="textarea" rows="4" formControlName="notes"></textarea>
    </div>

    <div class="actions">
      <button class="btn btn-secondary" type="button" (click)="back()">Cancelar</button>
      <button class="btn btn-primary" type="submit" [disabled]="submitting()">
        @if (submitting()) { Salvando... } @else { Salvar cadastro }
      </button>
    </div>
  </form>
</section>
