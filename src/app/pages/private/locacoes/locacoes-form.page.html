<app-page-header
  [title]="isEdit() ? 'Editar Locação' : 'Nova Locação'"
  subtitle="Contrato completo alinhado aos campos do Swagger"
  [breadcrumbs]="[{ label: 'Dashboard', route: '/app/dashboard' }, { label: 'Locações', route: '/app/locacoes' }, { label: isEdit() ? 'Editar' : 'Novo' }]"
/>

<section class="card-panel">
  <form class="grid-form lease-form" [formGroup]="form" (ngSubmit)="submit()">
    <div class="field field--full section-title"><h2>Vínculo</h2></div>

    <div class="field">
      <label class="field__label">Imóvel</label>
      <app-async-search-select
        formControlName="propertyId"
        [fetchPage]="propertySelectFetchPage"
        [fetchById]="propertySelectFetchById"
        [allowClear]="false"
        [useFloatingPanel]="true"
      />
    </div>

    <div class="field">
      <label class="field__label">Locatário</label>
      <app-async-search-select
        formControlName="tenantId"
        [fetchPage]="tenantSelectFetchPage"
        [fetchById]="tenantSelectFetchById"
        [allowClear]="false"
        [useFloatingPanel]="true"
      />
    </div>

    <div class="field field--action">
      <label class="field__label">Atalho</label>
      <button class="btn btn-secondary" type="button" (click)="goToCreateTenant()">Cadastrar locatário</button>
    </div>

    <div class="field field--full section-title"><h2>Condições principais</h2></div>

    <div class="field">
      <label class="field__label">Início</label>
      <input class="input" formControlName="startDate" appDateBrInput />
    </div>

    <div class="field">
      <label class="field__label">Fim</label>
      <input class="input" formControlName="endDate" appDateBrInput />
    </div>

    <div class="field">
      <label class="field__label">Aluguel mensal</label>
      <input class="input" formControlName="monthlyRent" appBrlCurrencyInput />
    </div>

    <div class="field">
      <label class="field__label">Caução</label>
      <input class="input" formControlName="depositAmount" appBrlCurrencyInput />
    </div>

    <div class="field">
      <label class="field__label">Contrato com</label>
      <input class="input" formControlName="contractWith" />
    </div>

    <div class="field">
      <label class="field__label">Dia do pagamento</label>
      <input class="input" type="number" min="1" max="31" formControlName="paymentDay" />
    </div>

    <div class="field">
      <label class="field__label">Local do pagamento</label>
      <input class="input" formControlName="paymentLocation" />
    </div>

    <div class="field">
      <label class="field__label">Índice de reajuste</label>
      <input class="input" formControlName="readjustmentIndex" />
    </div>

    @if (isEdit()) {
      <div class="field">
        <label class="field__label">Status</label>
        <app-async-search-select
          formControlName="status"
          [staticOptions]="leaseStatusOptions"
          [searchable]="false"
          [allowClear]="false"
        />
      </div>
    }

    <div class="field field--full section-title"><h2>Garantias e formalização</h2></div>

    <div class="field">
      <label class="field__label">Registro do contrato</label>
      <input class="input" formControlName="contractRegistration" />
    </div>

    <div class="field">
      <label class="field__label">Seguro</label>
      <input class="input" formControlName="insurance" />
    </div>

    <div class="field">
      <label class="field__label">Reconhecimento de firma</label>
      <input class="input" formControlName="signatureRecognition" />
    </div>

    <div class="field">
      <label class="field__label">Nome do fiador</label>
      <input class="input" formControlName="guarantorName" />
    </div>

    <div class="field">
      <label class="field__label">Documento do fiador</label>
      <input class="input" formControlName="guarantorDocument" appCpfCnpjInput />
    </div>

    <div class="field">
      <label class="field__label">Telefone do fiador</label>
      <input class="input" formControlName="guarantorPhone" appPhoneBrInput />
    </div>

    <div class="field field--full section-title"><h2>Contato adicional</h2></div>

    <div class="field">
      <label class="field__label">Nome do contato</label>
      <input class="input" formControlName="optionalContactName" />
    </div>

    <div class="field">
      <label class="field__label">Telefone do contato</label>
      <input class="input" formControlName="optionalContactPhone" appPhoneBrInput />
    </div>

    <div class="field field--full">
      <label class="field__label">Observações</label>
      <textarea class="textarea" rows="4" formControlName="notes"></textarea>
    </div>

    <div class="actions">
      <button class="btn btn-secondary" type="button" (click)="back()">Cancelar</button>
      <button class="btn btn-primary" type="submit" [disabled]="submitting()">
        @if (submitting()) { Salvando... } @else { Salvar contrato }
      </button>
    </div>
  </form>
</section>
