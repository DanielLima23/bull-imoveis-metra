<app-page-header
  [title]="isEdit() ? 'Editar Manutenção' : 'Nova Manutenção'"
  subtitle="Tela única de criação e atualização de manutenções"
  [breadcrumbs]="[{ label: 'Dashboard', route: '/app/dashboard' }, { label: 'Manutenções', route: '/app/manutencoes' }, { label: isEdit() ? 'Editar' : 'Novo' }]"
/>

<section class="card-panel">
  <form class="grid-form" [formGroup]="form" (ngSubmit)="submit()">
    <div class="field">
      <label class="field__label">Imóvel</label>
      <app-async-search-select
        formControlName="propertyId"
        placeholder="Selecione"
        searchPlaceholder="Buscar imóvel..."
        [pageSize]="15"
        [fetchPage]="propertySelectFetchPage"
        [fetchById]="propertySelectFetchById"
      />
    </div>

    <div class="field">
      <label class="field__label">Título</label>
      <input class="input" formControlName="title" />
    </div>

    <div class="field">
      <label class="field__label">Prioridade</label>
      <app-async-search-select
        formControlName="priority"
        [staticOptions]="priorityOptions"
        [searchable]="false"
        [allowClear]="false"
      />
    </div>

    @if (isEdit()) {
      <div class="field">
        <label class="field__label">Status</label>
        <app-async-search-select
          formControlName="status"
          [staticOptions]="statusOptions"
          [searchable]="false"
          [allowClear]="false"
        />
      </div>
    }

    <div class="field">
      <label class="field__label">Custo estimado</label>
      <input class="input" type="text" inputmode="decimal" formControlName="estimatedCost" appBrlCurrencyInput />
    </div>

    @if (isEdit()) {
      <div class="field">
        <label class="field__label">Custo real</label>
        <input class="input" type="text" inputmode="decimal" formControlName="actualCost" appBrlCurrencyInput />
      </div>

      <div class="field">
        <label class="field__label">Início</label>
        <input class="input" type="text" inputmode="numeric" formControlName="startedAtUtc" placeholder="dd/mm/yyyy hh:mm" appDateTimeBrInput />
      </div>

      <div class="field">
        <label class="field__label">Conclusão</label>
        <input class="input" type="text" inputmode="numeric" formControlName="finishedAtUtc" placeholder="dd/mm/yyyy hh:mm" appDateTimeBrInput />
      </div>
    }

    <div class="field field--full">
      <label class="field__label">Descrição</label>
      <textarea class="textarea" rows="4" formControlName="description"></textarea>
    </div>

    <div class="field field--full">
      <label class="field__label">Observações</label>
      <textarea class="textarea" rows="3" formControlName="notes"></textarea>
    </div>

    <div class="actions">
      <button class="btn btn-secondary" type="button" (click)="back()">Cancelar</button>
      <button class="btn btn-primary" type="submit" [disabled]="submitting()">
        @if (submitting()) { Salvando... } @else { Salvar cadastro }
      </button>
    </div>
  </form>
</section>
