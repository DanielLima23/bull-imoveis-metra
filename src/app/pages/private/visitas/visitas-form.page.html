<app-page-header
  [title]="isEdit() ? 'Editar Visita' : 'Nova Visita'"
  subtitle="Tela Ãºnica de criaÃ§Ã£o e atualizaÃ§Ã£o de visitas"
  [breadcrumbs]="[{ label: 'Painel', route: '/app/dashboard' }, { label: 'Visitas', route: '/app/visitas' }, { label: isEdit() ? 'Editar' : 'Novo' }]"
/>

<section class="card-panel">
  <form class="grid-form" [formGroup]="form" (ngSubmit)="submit()">
    <div class="field">
      <label class="field__label">ImÃ³vel</label>
      <app-async-search-select
        formControlName="propertyId"
        placeholder="Selecione"
        searchPlaceholder="Buscar imÃ³vel..."
        [pageSize]="15"
        [fetchPage]="propertySelectFetchPage"
        [fetchById]="propertySelectFetchById"
      />
    </div>

    <div class="field">
      <label class="field__label">Data agendada</label>
      <input class="input" type="text" inputmode="numeric" formControlName="scheduledAtUtc" placeholder="dd/mm/aaaa hh:mm" appDateTimeBrInput />
    </div>

    <div class="field">
      <label class="field__label">Pessoa do contato</label>
      <app-party-picker-field
        formControlName="contactPartyId"
        [allowedKinds]="['PERSON', 'COMPANY', 'OUTRO', 'CORRETOR']"
        defaultKind="PERSON"
        placeholder="Selecione o contato"
        (partyChange)="onContactPartyChange($event)"
      />
    </div>

    <div class="field">
      <label class="field__label">Nome do contato</label>
      <input class="input" [class.input--locked]="isContactLocked()" formControlName="contactName" [readOnly]="isContactLocked()" placeholder="Informe o nome do contato" />
    </div>

    <div class="field">
      <label class="field__label">Telefone</label>
      <input class="input" [class.input--locked]="isContactLocked()" formControlName="contactPhone" [readOnly]="isContactLocked()" inputmode="tel" appPhoneBrInput placeholder="(00) 00000-0000" />
    </div>

    <div class="field">
      <label class="field__label">Pessoa responsÃ¡vel</label>
      <app-party-picker-field
        formControlName="responsiblePartyId"
        [allowedKinds]="['PERSON', 'COMPANY', 'OUTRO', 'CORRETOR', 'ADMINISTRADOR', 'PRESTADOR_DE_SERVICO']"
        defaultKind="PERSON"
        placeholder="Selecione o responsÃ¡vel"
        (partyChange)="onResponsiblePartyChange($event)"
      />
    </div>

    <div class="field">
      <label class="field__label">ResponsÃ¡vel</label>
      <input class="input" [class.input--locked]="isResponsibleLocked()" formControlName="responsibleName" [readOnly]="isResponsibleLocked()" placeholder="Informe o responsÃ¡vel pelo atendimento" />
    </div>

    @if (isEdit()) {
      <div class="field">
        <label class="field__label">Status</label>
        <app-async-search-select
          formControlName="status"
          [staticOptions]="visitStatusOptions"
          [searchable]="false"
          [allowClear]="false"
        />
      </div>
    }

    <div class="field field--full">
      <label class="field__label">ObservaÃ§Ãµes</label>
      <textarea class="textarea" rows="4" formControlName="notes" placeholder="Adicione observaÃ§Ãµes sobre a visita"></textarea>
    </div>

    <div class="actions">
      <button class="btn btn-secondary" type="button" (click)="back()">Cancelar</button>
      <button class="btn btn-primary" type="submit" [disabled]="submitting()">
        @if (submitting()) { Salvando... } @else { Salvar cadastro }
      </button>
    </div>
  </form>
</section>
