<app-page-header
  [title]="isEdit() ? 'Editar Imóvel' : 'Novo Imóvel'"
  subtitle="Cadastro orientado por CEP com endereço preenchido automaticamente"
  [breadcrumbs]="[{ label: 'Dashboard', route: '/app/dashboard' }, { label: 'Imóveis', route: '/app/imoveis' }, { label: isEdit() ? 'Editar' : 'Novo' }]"
/>

<section class="card-panel">
  <form class="grid-form" [formGroup]="form" (ngSubmit)="submit()" [class.invalid-submit]="invalidSubmitPulse()">
    <div class="field">
      <label class="field__label">Apelido</label>
      <input class="input" formControlName="alias" />
    </div>

    <div class="field">
      <label class="field__label">Tipo do imóvel</label>
      <app-async-search-select
        formControlName="propertyType"
        placeholder="Selecione"
        [staticOptions]="propertyTypeOptions"
        [searchable]="false"
        [allowClear]="false"
      />
    </div>

    <div class="field">
      <label class="field__label">Status</label>
      <app-async-search-select
        formControlName="status"
        [staticOptions]="propertyStatusOptions"
        [searchable]="false"
        [allowClear]="false"
      />
    </div>

    <div class="field field--full">
      <label class="field__label">CEP</label>
      <div class="zip-row">
        <input class="input" formControlName="zipCode" inputmode="numeric" />
        <button class="btn btn-secondary" type="button" (click)="searchCep()" [disabled]="isCepLoading()">Buscar CEP</button>
      </div>
    </div>

    <p class="cep-feedback" [class.loading]="isCepLoading()" [class.success]="cepStatus() === 'success'" [class.error]="cepStatus() === 'error'">
      @if (isCepLoading()) {
        <span class="spinner" aria-hidden="true"></span>
      }
      <span>{{ cepStatusText() }}</span>
    </p>

    <p class="auto-legend">[AUTO] Rua, Bairro, Cidade e UF são preenchidos pelo CEP e ficam bloqueados.</p>

    <div class="field">
      <label class="field__label">Rua</label>
      <input class="input auto-filled" formControlName="street" />
    </div>

    <div class="field">
      <label class="field__label">Numero</label>
      <input class="input" formControlName="number" />
    </div>

    <div class="field">
      <label class="field__label">Complemento</label>
      <input class="input" formControlName="complement" />
    </div>

    <div class="field">
      <label class="field__label">Bairro</label>
      <input class="input auto-filled" formControlName="district" />
    </div>

    <div class="field">
      <label class="field__label">Cidade</label>
      <input class="input auto-filled" formControlName="city" />
    </div>

    <div class="field">
      <label class="field__label">UF</label>
      <input class="input uf auto-filled" formControlName="state" />
    </div>

    <div class="field field--full">
      <label class="field__label">Observações</label>
      <textarea class="textarea" formControlName="notes" rows="4"></textarea>
    </div>

    <div class="actions">
      <button class="btn btn-secondary" type="button" (click)="back()">Cancelar</button>
      <button class="btn btn-primary" type="submit" [disabled]="submitting()">
        @if (submitting()) { Salvando... } @else { Salvar cadastro }
      </button>
    </div>
  </form>
</section>
