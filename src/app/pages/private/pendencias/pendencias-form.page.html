<app-page-header
  [title]="isEdit() ? 'Editar Pendência' : 'Nova Pendência'"
  subtitle="Tela única de criação e atualização de pendências"
  [breadcrumbs]="[{ label: 'Dashboard', route: '/app/dashboard' }, { label: 'Pendências', route: '/app/pendencias' }, { label: isEdit() ? 'Editar' : 'Novo' }]"
/>

<section class="card-panel">
  <form class="grid-form" [formGroup]="form" (ngSubmit)="submit()">
    <div class="field">
      <label class="field__label">Imóvel</label>
      <app-async-search-select
        formControlName="propertyId"
        placeholder="Selecione"
        searchPlaceholder="Buscar imóvel..."
        [pageSize]="15"
        [fetchPage]="propertySelectFetchPage"
        [fetchById]="propertySelectFetchById"
      />
    </div>

    <div class="field">
      <label class="field__label">Tipo</label>
      <app-async-search-select
        formControlName="pendencyTypeId"
        placeholder="Selecione"
        [staticOptions]="pendencyTypeOptions()"
        [searchable]="false"
        [allowClear]="false"
      />
    </div>

    <div class="field">
      <label class="field__label">Título</label>
      <input class="input" formControlName="title" />
    </div>

    <div class="field">
      <label class="field__label">Vencimento</label>
      <input class="input" type="text" inputmode="numeric" formControlName="dueAtUtc" placeholder="dd/mm/yyyy hh:mm" appDateTimeBrInput />
    </div>

    <div class="field field--full">
      <label class="field__label">Descrição</label>
      <textarea class="textarea" rows="4" formControlName="description"></textarea>
    </div>

    <div class="actions">
      <button class="btn btn-secondary" type="button" (click)="back()">Cancelar</button>
      <button class="btn btn-primary" type="submit" [disabled]="submitting()">
        @if (submitting()) { Salvando... } @else { Salvar cadastro }
      </button>
    </div>
  </form>
</section>
