<div class="toast-stack" aria-live="polite" aria-atomic="false">
  @for (toast of toasts(); track toast.id) {
    <article class="toast" [ngClass]="['toast--' + toast.variant, toast.closing ? 'toast--leaving' : '']">
      <div class="toast__content">
        @if (toast.title) {
          <strong>{{ toast.title }}</strong>
        }
        <p>{{ toast.message }}</p>
      </div>
      <button type="button" class="toast__close" (click)="dismiss(toast.id)">x</button>
    </article>
  }
</div>
