<div class="private-layout" [class.nav-open]="isMobileOpen()" [class.nav-collapsed]="isCollapsed()">
  <button class="overlay" type="button" (click)="closeMobileMenu()" aria-label="Fechar menu"></button>

  <aside class="sidenav page-surface">
    <div class="sidenav__head">
      <button class="brand" type="button" (click)="onBrandClick()">
        <span class="brand__mark">{{ brandShortName() }}</span>
        @if (!isCollapsed()) {
          <span class="brand__name">{{ brandName() }}</span>
        }
      </button>

      @if (!isCollapsed()) {
        <button class="collapse-btn" type="button" (click)="toggleCollapse()" aria-label="Fechar barra lateral">
          <span>&lt;</span>
        </button>
      }
    </div>

    <nav class="nav">
      @for (item of menuItems(); track item.route) {
        <a [routerLink]="item.route" routerLinkActive="active" (click)="onMenuItemClick($event)" [attr.aria-label]="isCollapsed() ? item.label : null">
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" class="icon-svg">
              @switch (item.icon) {
                @case ('dashboard') {
                  <rect x="3" y="3" width="7" height="7" rx="1.5" />
                  <rect x="14" y="3" width="7" height="4" rx="1.5" />
                  <rect x="14" y="9" width="7" height="12" rx="1.5" />
                  <rect x="3" y="12" width="7" height="9" rx="1.5" />
                }
                @case ('imoveis') {
                  <path d="M3 10.5 12 3l9 7.5" />
                  <path d="M5 9.5V21h14V9.5" />
                  <path d="M10 21v-6h4v6" />
                }
                @case ('locatarios') {
                  <circle cx="9" cy="8" r="3" />
                  <path d="M3 19a6 6 0 0 1 12 0" />
                  <circle cx="17" cy="10" r="2.5" />
                  <path d="M14 19a5 5 0 0 1 7 0" />
                }
                @case ('locacoes') {
                  <rect x="3" y="5" width="18" height="14" rx="2" />
                  <path d="M3 10h18" />
                  <path d="M7 15h5" />
                }
                @case ('despesas') {
                  <path d="M4 7h16" />
                  <path d="M6 3h12v18H6z" />
                  <path d="M9 12h6" />
                  <path d="M9 16h4" />
                }
                @case ('pendencias') {
                  <circle cx="12" cy="12" r="9" />
                  <path d="M12 7v5" />
                  <circle cx="12" cy="16.6" r="0.65" />
                }
                @case ('visitas') {
                  <path d="M3 12s3.5-5.5 9-5.5S21 12 21 12s-3.5 5.5-9 5.5S3 12 3 12Z" />
                  <circle cx="12" cy="12" r="2.5" />
                }
                @case ('manutencoes') {
                  <path d="m14 3 7 7-4 4-7-7z" />
                  <path d="M3 21h6l8-8-6-6-8 8z" />
                }
                @case ('relatorios') {
                  <path d="M6 3h9l4 4v14H6z" />
                  <path d="M15 3v5h5" />
                  <path d="M9 13h6" />
                  <path d="M9 17h6" />
                }
                @case ('configuracoes') {
                  <circle cx="12" cy="12" r="3" />
                  <path d="M19.4 15a1 1 0 0 0 .2 1.1l.1.1a1.8 1.8 0 1 1-2.6 2.6l-.1-.1a1 1 0 0 0-1.1-.2 1 1 0 0 0-.6.9V20a1.8 1.8 0 1 1-3.6 0v-.2a1 1 0 0 0-.6-.9 1 1 0 0 0-1.1.2l-.1.1a1.8 1.8 0 1 1-2.6-2.6l.1-.1a1 1 0 0 0 .2-1.1 1 1 0 0 0-.9-.6H4a1.8 1.8 0 1 1 0-3.6h.2a1 1 0 0 0 .9-.6 1 1 0 0 0-.2-1.1l-.1-.1a1.8 1.8 0 1 1 2.6-2.6l.1.1a1 1 0 0 0 1.1.2h.1a1 1 0 0 0 .6-.9V4a1.8 1.8 0 1 1 3.6 0v.2a1 1 0 0 0 .6.9h.1a1 1 0 0 0 1.1-.2l.1-.1a1.8 1.8 0 1 1 2.6 2.6l-.1.1a1 1 0 0 0-.2 1.1v.1a1 1 0 0 0 .9.6H20a1.8 1.8 0 1 1 0 3.6h-.2a1 1 0 0 0-.9.6z" />
                }
              }
            </svg>
          </span>
          @if (!isCollapsed()) {
            <span class="label">{{ item.label }}</span>
          }
        </a>
      }
    </nav>
  </aside>

  <section class="workspace">
    <header class="topbar page-surface">
      <button type="button" class="menu-btn btn btn-secondary" (click)="toggleMobileMenu()">Menu</button>

      <div class="user">
        <span class="user__avatar" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <circle cx="12" cy="8" r="3.5"></circle>
            <path d="M5.5 20a6.5 6.5 0 0 1 13 0"></path>
          </svg>
        </span>
        @if (user(); as currentUser) {
          <div class="user__meta">
            <strong>{{ currentUser.name }}</strong>
            <span>{{ currentUser.role }}</span>
          </div>
        }
      </div>

      <button type="button" class="btn btn-secondary" (click)="logout()">Sair</button>
    </header>

    <main class="content">
      <router-outlet />
    </main>
  </section>
</div>
